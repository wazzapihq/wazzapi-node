name: Publish package

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.release.target_commitish == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js for npm publishing
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Detect npm package state
        id: package_state
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_URL=$(node -p "'https://registry.npmjs.org/' + encodeURIComponent(require('./package.json').name)")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

          if curl -fsS "$PACKAGE_URL" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish existing package with trusted publishing
        if: steps.package_state.outputs.exists == 'true'
        run: npm publish --provenance --access public

      - name: Require NPM_TOKEN for first publish
        if: steps.package_state.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "$NODE_AUTH_TOKEN" ]]; then
            echo "::error::The npm package '${{ steps.package_state.outputs.name }}' does not exist yet. Add an npm publish token as the NPM_TOKEN repository secret for the first release. After the first successful publish, keep trusted publishing enabled for future releases."
            exit 1
          fi

      - name: Publish new package with npm token
        if: steps.package_state.outputs.exists != 'true'
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
          ACTIONS_ID_TOKEN_REQUEST_URL: ""
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "false"
        run: npm publish --access public
